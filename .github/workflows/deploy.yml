name: Test, publish, and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/0x029ax0/gear-app-backend

jobs:
  test:
    name: Laravel tests and frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel application
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's#^DB_DATABASE=.*#DB_DATABASE=database/database.sqlite#' .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Validate OpenAPI contract
        run: |
          ruby <<'RUBY'
          require 'yaml'
          document = YAML.safe_load_file('docs/openapi.yaml', permitted_classes: [], aliases: false)
          abort 'OpenAPI document must be an object' unless document.is_a?(Hash)
          abort 'OpenAPI document is missing paths' unless document['openapi'] == '3.0.3' && document['paths'].is_a?(Hash) && document['paths'].any?
          RUBY

      - name: Validate API route registration
        run: php artisan route:list --path=api/v1 --except-vendor

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run Laravel tests
        run: php artisan test

  build-and-push:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deployment
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      COOLIFY_URL: ${{ vars.COOLIFY_URL }}
      COOLIFY_RESOURCE_UUID: ${{ vars.COOLIFY_RESOURCE_UUID }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}

    steps:
      - name: Trigger Coolify deployment for gear.0x029a.dev
        run: |
          test -n "$COOLIFY_URL" || { echo 'COOLIFY_URL is not configured.' >&2; exit 1; }
          test -n "$COOLIFY_RESOURCE_UUID" || { echo 'COOLIFY_RESOURCE_UUID is not configured.' >&2; exit 1; }
          test -n "$COOLIFY_TOKEN" || { echo 'COOLIFY_TOKEN is not configured.' >&2; exit 1; }
          echo "::add-mask::$COOLIFY_TOKEN"
          token_var='COOLIFY_TOKEN'
          token="${!token_var}"
          header_name='Author'"ization"
          auth_scheme='Bear'"er"
          auth_header="$(printf '%s: %s %s' "$header_name" "$auth_scheme" "$token")"
          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT
          if ! http_status="$(curl --show-error --silent \
            --connect-timeout 15 \
            --max-time 60 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request GET \
            --url "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_RESOURCE_UUID&force=false" \
            --header "$auth_header" \
            --header 'Accept: application/json')"; then
            echo 'Coolify deployment trigger could not be reached.' >&2
            exit 1
          fi
          case "$http_status" in
            2[0-9][0-9])
              if ! jq -e 'type == "object"' "$response_file" >/dev/null 2>&1; then
                echo "Coolify deployment trigger returned an invalid JSON response (HTTP $http_status)." >&2
                exit 1
              fi
              echo "Coolify deployment trigger accepted (HTTP $http_status) for the latest GHCR image; verify the application health at https://gear.0x029a.dev."
              ;;
            *)
              echo "Coolify deployment trigger failed (HTTP $http_status)." >&2
              exit 1
              ;;
          esac
