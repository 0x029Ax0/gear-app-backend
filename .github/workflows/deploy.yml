name: Test, publish, and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/0x029ax0/gear-app-backend

jobs:
  test:
    name: Laravel tests and frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel application
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's#^DB_DATABASE=.*#DB_DATABASE=database/database.sqlite#' .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Validate OpenAPI contract
        run: |
          ruby <<'RUBY'
          require 'yaml'
          document = YAML.safe_load_file('docs/openapi.yaml', permitted_classes: [], aliases: false)
          abort 'OpenAPI document must be an object' unless document.is_a?(Hash)
          abort 'OpenAPI document is missing paths' unless document['openapi'] == '3.0.3' && document['paths'].is_a?(Hash) && document['paths'].any?
          RUBY

      - name: Validate API route registration
        run: php artisan route:list --path=api/v1 --except-vendor

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run Laravel tests
        run: php artisan test

  build-and-push:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deployment
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}

    steps:
      - name: Skip deployment when webhook secret is not configured
        if: ${{ env.COOLIFY_WEBHOOK_URL == '' }}
        run: echo 'COOLIFY_WEBHOOK_URL is not configured; skipping Coolify deployment.'

      - name: Trigger Coolify webhook for gear.0x029a.dev
        if: ${{ env.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          curl --fail-with-body --show-error --silent \
            --request GET \
            --url "$COOLIFY_WEBHOOK_URL"
          echo 'Coolify deployment webhook accepted; verify the application health at https://gear.0x029a.dev.'
